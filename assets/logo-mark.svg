<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mamataGrad" x1="10" y1="10" x2="90" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E39A87"/>
      <stop offset="0.55" stop-color="#C9707C"/>
