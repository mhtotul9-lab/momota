    <path fill="#7E9470" d="M50,22 C46,15 47,7 52,1 C55,9 54,17 50,22 Z"/>
    <path fill="#96A985" d="M50,22 C54,17 61,14 68,16 C64,23 57,26 50,22 Z"/>
