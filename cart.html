<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কার্ট ও চেকআউট — Mamata (মমতা)</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C9707C">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cart">

<div id="site-header"></div>

<section class="section" style="padding-top:44px;">
  <div class="container">
    <h2 class="mt-8">আপনার কার্ট</h2>
    <p class="muted mt-8">লগইন ছাড়াই অর্ডার করতে পারবেন — গেস্ট চেকআউট সম্পূর্ণ সাপোর্টেড।</p>

    <div class="mt-32" style="display:grid;grid-template-columns:1.4fr 1fr;gap:36px;align-items:flex-start;">
      <div class="card" style="padding:22px;">
        <div id="cartList"></div>
      </div>

      <div class="card" id="cartSummary" style="padding:22px;">
        <h3 style="margin-bottom:18px;">অর্ডার সামারি</h3>
        <div class="flex justify-between mt-8"><span class="muted">সাবটোটাল</span><strong id="cartTotal">৳0</strong></div>
        <div class="flex justify-between mt-8"><span class="muted">ডেলিভারি</span><span class="muted">ক্যাশ অন ডেলিভারি</span></div>
        <hr style="margin:16px 0;border-color:var(--line);">

        <form id="checkoutForm" onsubmit="submitOrder(event)">
          <div class="field"><label>পুরো নাম *</label><input id="coName" required placeholder="যেমন: করিম উদ্দিন"></div>
          <div class="field"><label>মোবাইল নম্বর *</label><input id="coPhone" required placeholder="01XXXXXXXXX" pattern="01[0-9]{9}"></div>
          <div class="field"><label>ডেলিভারি ঠিকানা *</label><textarea id="coAddress" required rows="3" placeholder="বাসা/রোড, এলাকা, জেলা"></textarea></div>
          <div class="field"><label>বিশেষ নোট (ঐচ্ছিক)</label><input id="coNote" placeholder="যেমন: সন্ধ্যায় ডেলিভারি দিন"></div>
          <button class="btn btn-primary btn-block" id="checkoutBtn" type="submit">অর্ডার সম্পন্ন করুন</button>
          <p class="muted center mt-8" style="font-size:.8rem;">অর্ডার করে আপনি আমাদের শর্তাবলীতে সম্মত হচ্ছেন।</p>
        </form>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
<script src="js/layout.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
