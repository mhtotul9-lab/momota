<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>প্রোডাক্ট — Mamata (মমতা)</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C9707C">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="shop">

<div id="site-header"></div>

<section class="section" style="padding-top:44px;">
  <div class="container" id="productDetail" style="display:grid;grid-template-columns:1fr 1fr;gap:50px;">
    <div class="skeleton" style="aspect-ratio:1/1;border-radius:var(--r-lg);"></div>
    <div>
      <div class="skeleton" style="height:32px;width:70%;margin-bottom:16px;"></div>
      <div class="skeleton" style="height:20px;width:40%;margin-bottom:24px;"></div>
      <div class="skeleton" style="height:100px;"></div>
    </div>
  </div>

  <div class="container mt-32">
    <h3 class="mt-32">সম্পর্কিত প্রোডাক্ট</h3>
    <div class="grid grid-4 mt-16" id="relatedGrid"></div>
  </div>
</section>

<div id="site-footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
<script src="js/layout.js"></script>
<script src="js/shop.js"></script>
<script>
  const productId = new URLSearchParams(window.location.search).get("id");

  function renderDetail() {
    const p = ALL_PRODUCTS.find(x => x.id === productId) || ALL_PRODUCTS[0];
    if (!p) return;
    document.getElementById("productDetail").innerHTML = `
      <div style="background:var(--rose-tint);border-radius:var(--r-lg);aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:9rem;">${p.image || "🧸"}</div>
      <div>
        <span class="tag">${p.category || "general"}</span>
        <h1 style="font-size:1.9rem;margin-bottom:10px;">${p.name}</h1>
        <div class="stars mt-8">★★★★★ <span class="muted">(${p.reviews || 12} রিভিউ)</span></div>
        <div class="price" style="font-size:1.7rem;margin:18px 0;">${bdt(p.price)} ${p.oldPrice ? `<span class="old">${bdt(p.oldPrice)}</span>` : ""}</div>
        <p class="muted">${p.description || "যত্ন সহকারে বাছাই করা একটি নিরাপদ ও মানসম্মত বেবি প্রোডাক্ট, বাংলাদেশের প্রতিটি পরিবারের জন্য উপযোগী।"}</p>
        <div class="flex gap-10 mt-32">
          <button class="btn btn-primary" onclick='addToCart(${JSON.stringify({id:p.id,name:p.name,price:p.price,image:p.image}).replace(/'/g,"&#39;")})'>🛍️ কার্টে যোগ করুন</button>
          <a href="cart.html" class="btn btn-outline">এখনই কিনুন</a>
        </div>
      </div>`;
    document.getElementById("relatedGrid").innerHTML = ALL_PRODUCTS.filter(x => x.id !== p.id).slice(0, 4).map(productCardHTML).join("");
  }

  document.addEventListener("mamata:products-loaded", renderDetail);
</script>
</body>
</html>
